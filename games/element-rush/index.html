<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Element Rush</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../logo.css">
  <script src="../../lock.js"></script>
</head>
<body>

  <img class="brand-logo-corner" src="../../logo.svg" alt="Austin Simpson logo">

  <a class="back-link" href="../../index.html">&larr; Back to Arcade</a>

  <h1>Element Rush</h1>
  <p class="instructions">&larr;/&rarr; or 1/2/3 or click a bin &mdash; sort each element into the right category before it crosses the line!</p>

  <div class="hud">
    <span>Score: <span id="score">0</span></span>
    <span>Best: <span id="best-score">0</span></span>
    <span>Lives: <span id="lives">♥♥♥</span></span>
    <span>Level: <span id="level">1</span></span>
  </div>

  <p id="feedback"></p>

  <canvas id="game" width="640" height="480"></canvas>

  <div class="bin-labels">
    <button class="bin" data-lane="0">Metal</button>
    <button class="bin" data-lane="1">Nonmetal</button>
    <button class="bin" data-lane="2">Noble Gas</button>
  </div>

  <div id="game-over" hidden>
    <h2>Game Over</h2>
    <p>Final Score: <span id="final-score">0</span></p>
    <p id="new-best" hidden>New personal best!</p>
    <div class="session-over-actions">
      <button id="restart">Play Again</button>
      <a class="back-link" href="../../index.html">&larr; Back to Arcade</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="../../platform.js"></script>
  <script src="game.js"></script>
</body>
</html>
