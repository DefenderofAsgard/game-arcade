<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../logo.css">
  <script src="../../lock.js"></script>
</head>
<body>

  <img class="brand-logo-corner" src="../../logo.svg" alt="Austin Simpson logo">

  <a class="back-link" href="../../index.html">&larr; Back to Arcade</a>

  <h1>Chess</h1>
  <p class="instructions">Click a piece, then click a highlighted square to move it.</p>

  <div id="mode-select">
    <button id="mode-cpu">Play vs Computer</button>
    <button id="mode-online">Play a Friend Online</button>
    <a class="link-btn" href="customize.html">Customize Board &amp; Pieces</a>
  </div>

  <div id="online-setup" hidden>
    <div id="online-choice">
      <button id="create-room-btn">Create Room</button>
      <div class="join-form">
        <input id="join-code-input" maxlength="5" placeholder="Room code">
        <button id="join-room-btn">Join Room</button>
      </div>
    </div>

    <div id="room-info" hidden>
      <p>Room code: <strong id="room-code-display"></strong></p>
      <div class="invite-actions">
        <button id="copy-invite-btn">Copy Invite Link</button>
        <a id="email-invite-link" href="#">Invite via Email</a>
      </div>
      <p id="invite-link-fallback" class="fallback-link" hidden></p>
      <p id="copy-status" class="status-text"></p>
      <p id="waiting-status" class="status-text">Waiting for your friend to join&hellip;</p>
    </div>

    <p id="online-error" class="error-text" hidden></p>
    <button id="online-back-btn" class="link-btn">&larr; Back</button>
  </div>

  <div id="board-screen" hidden>
    <div class="hud">
      <span id="side-label"></span>
      <span id="turn-indicator"></span>
      <span id="cpu-thinking" hidden>Computer is thinking&hellip;</span>
    </div>

    <div id="board" class="board"></div>
  </div>

  <div id="result-banner" hidden>
    <h2 id="result-heading"></h2>
    <div class="session-over-actions">
      <button id="play-again-btn">Play Again</button>
      <button id="menu-btn">Back to Menu</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="../../platform.js"></script>
  <script src="../shared/multiplayer.js"></script>
  <script src="game.js"></script>
</body>
</html>
