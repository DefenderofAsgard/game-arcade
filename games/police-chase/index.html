<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cop Chase</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../logo.css">
  <script src="../../lock.js"></script>
</head>
<body>

  <img class="brand-logo-corner" src="../../logo.svg" alt="Austin Simpson logo">

  <a class="back-link" href="../../index.html">&larr; Back to Arcade</a>

  <h1>Cop Chase</h1>
  <p class="instructions">Up = Accelerate &nbsp;|&nbsp; Space = Brake &nbsp;|&nbsp; Left/Right = Steer</p>

  <div class="hud">
    <span>Time: <span id="time">0:00</span></span>
    <span>Coins: <span id="coins">0</span></span>
    <span>Score: <span id="score">0</span></span>
    <span>Best: <span id="best-score">0</span></span>
    <span>Wanted:</span>
    <div class="wanted-bar"><div id="wanted-fill" class="wanted-fill"></div></div>
  </div>

  <canvas id="game" width="800" height="500"></canvas>

  <div id="game-over" hidden>
    <h2>Busted!</h2>
    <p>Time Survived: <span id="final-time">0:00</span></p>
    <p>Coins Collected: <span id="final-coins">0</span></p>
    <p>Final Score: <span id="final-score">0</span></p>

    <div id="name-entry" hidden>
      <p>New top 3 score! Enter your name:</p>
      <input id="player-name" maxlength="20" placeholder="Your name">
      <button id="submit-score">Submit</button>
    </div>

    <p id="new-best" hidden>New personal best!</p>
    <div class="session-over-actions">
      <button id="restart">Try Again</button>
      <a class="back-link" href="../../index.html">&larr; Back to Arcade</a>
    </div>
  </div>

  <div id="leaderboard">
    <h2>Top Scores</h2>
    <ol id="leaderboard-list"></ol>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="../../platform.js"></script>
  <script src="leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
